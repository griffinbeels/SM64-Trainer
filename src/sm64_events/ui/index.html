<!doctype html>
<html><head><meta charset="utf-8"><title>SM64 Trainer</title>
<link rel="icon" type="image/png" href="/ui/favicon.png">
<script type="importmap">
{"imports": {
  "preact": "/ui/vendor/preact.module.js",
  "preact/hooks": "/ui/vendor/hooks.module.js",
  "htm": "/ui/vendor/htm.module.js"
}}
</script>
<style>
  body { font-family: Consolas, monospace; background: #14161a; color: #d8dee9;
         max-width: 980px; margin: 1.5rem auto; padding: 0 1rem; }
  h1 { font-size: 1.2rem; margin: 0; }
  a { color: #6fa8ff; }
  button { font: inherit; background: #232730; color: #d8dee9; border: 1px solid #3a4150;
           border-radius: 4px; padding: .15rem .55rem; cursor: pointer; }
  button:hover { background: #2c3140; }
  select, input { font: inherit; background: #1b1e24; color: #d8dee9;
                  border: 1px solid #3a4150; border-radius: 4px; padding: .15rem .3rem; }
  .bar { display: flex; flex-wrap: wrap; gap: .6rem; align-items: center;
         background: #1b1e24; border-radius: 6px; padding: .5rem .8rem; margin: .8rem 0; }
  .dot { padding: .1rem .5rem; border-radius: 4px; font-size: .85em; }
  .ok { background: #1d3a1d; color: #a3e0a3; } .bad { background: #3a1d1d; color: #e0a3a3; }
  .tabs { display: flex; gap: .3rem; margin: .8rem 0 0 0; }
  .tab { border: 1px solid #3a4150; border-bottom: none; border-radius: 6px 6px 0 0;
         padding: .25rem 1rem; cursor: pointer; opacity: .65; }
  .tab.on { background: #1b1e24; opacity: 1; font-weight: bold; }
  .pane { border: 1px solid #3a4150; border-radius: 0 6px 6px 6px; padding: .8rem; }
  .starsec { border: 1px solid #2c3140; border-radius: 8px; padding: .6rem .8rem; margin: 0 0 .8rem 0; }
  .active-star { border-color: #e0c36a; }
  .stagebanner { border-color: #2f6d8c; }
  .stagebanner-row { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .4rem; }
  .stagebtn { display: flex; flex-direction: column; align-items: flex-start;
              gap: .15rem; min-width: 7rem; padding: .35rem .55rem;
              text-align: left; cursor: pointer; }
  .stagebtn-name { font-weight: 600; line-height: 1.2; }
  .stagebtn-sub { font-size: .8em; display: flex; align-items: center; gap: .3rem; }
  .stagebtn.active-star { border-color: #e0c36a; }
  .segrow { display: flex; gap: .5rem; align-items: center; border: 1px solid #2c3140; border-radius: 8px; padding: .4rem .6rem; margin-bottom: .4rem; }
  .segsection { border: 1px solid #2c3140; border-radius: 8px; padding: .45rem .55rem; margin: .5rem 0; }
  .seghead { padding: .2rem .5rem; border-radius: 5px; margin-bottom: .3rem; font-size: .9em; }
  /* muted section identities: start=green, end=red, guards=orange */
  .seg-start { border-color: #2f4a38; } .seg-start .seghead { background: #16291c; color: #8fce9f; }
  .seg-end { border-color: #4a2f2f; } .seg-end .seghead { background: #291616; color: #ce8f8f; }
  .seg-guard { border-color: #4a3c2a; } .seg-guard .seghead { background: #292016; color: #cead7f; }
  .segclause { display: flex; flex-wrap: wrap; gap: .4rem; margin: .3rem 0; align-items: center; padding: .3rem .45rem; border-radius: 6px; }
  .segclause select { max-width: 100%; min-width: 0; } /* min-width:0 required: flex min-width:auto = min-content, so a wide level name punches through the pane with max-width alone */
  .segword { color: #6c7686; font-size: .85em; }
  /* one tint per alternative clause (cycling): new color = new condition */
  .tint0 { background: #161d2b; border-left: 3px solid #4a6fa5; }
  .tint1 { background: #16241c; border-left: 3px solid #3f8a5f; }
  .tint2 { background: #221a2b; border-left: 3px solid #7e5fa5; }
  .tint3 { background: #281f14; border-left: 3px solid #a5823f; }
  .segbuilder { border: 1px solid #3a4150; border-radius: 8px; padding: .6rem; margin-top: .6rem; }
  .routebuilder { border: 1px solid #3a4150; border-radius: 8px; padding: .6rem; margin: .6rem 0; }
  .routestep { border: 1px solid #2c3140; border-radius: 8px; padding: .4rem .55rem; margin: .4rem 0; }
  .routestep.routebroken { border-color: #4a2f2f; }
  .routestep-head { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; }
  .routestep-foot { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-top: .35rem; }
  .routenum { color: #6c7686; }
  .routerate { color: #cead7f; font-size: .85em; }
  .routecum { color: #e0c36a; font-size: .85em; }
  .routecands { display: flex; flex-wrap: wrap; gap: .35rem; margin: .3rem 0; }
  .routepick { display: inline-flex; flex-wrap: wrap; gap: .3rem; align-items: center; }
  .routeadd { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-top: .4rem; }
  .routestart { margin: .5rem 0; }
  .candx { border: none; background: transparent; color: #e0a3a3; padding: 0 0 0 .25rem; cursor: pointer; }
  .routeio { border: 1px solid #2c3140; border-radius: 8px; padding: .6rem; margin-top: .8rem; display: flex; flex-direction: column; gap: .6rem; }
  .routejson { width: 100%; min-height: 5rem; font: inherit; background: #1b1e24; color: #d8dee9; border: 1px solid #3a4150; border-radius: 4px; }
  .routefstep { border: 1px solid #2c3140; border-radius: 8px; padding: .4rem .6rem; margin: 0 0 .6rem 0; }
  .routefstep.active-star { border-color: #e0c36a; }
  .routecur { border-color: #4ca; color: #4ca; }
  .routefstep .shead { align-items: center; }
  .active-tag { color: #e0c36a; font-size: .7em; letter-spacing: 1px; margin-bottom: .2rem; }
  .listhead { letter-spacing: 1px; text-transform: uppercase; font-size: .7em; margin: .2rem 0 .4rem; }
  .shead { display: flex; flex-wrap: wrap; gap: .6rem; align-items: baseline; }
  .shead b { color: #ffd75f; }
  .meta { color: #6c7686; font-size: .85em; }
  .pbtag { color: #a3e0a3; margin-left: auto; }
  .pblink { color: inherit; text-decoration: underline; cursor: pointer; }
  .pblink:hover { color: #c9f5c9; }
  table { width: 100%; border-collapse: collapse; margin: .4rem 0; font-size: .92em; }
  td { padding: .15rem .45rem; border-bottom: 1px dotted #2c3140; }
  .good { color: #a3e0a3; } .badx { color: #e0a3a3; } .cleared { opacity: .45; text-decoration: line-through; }
  .chips { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .35rem; }
  .chip { border: 1px solid #3a4150; border-radius: 999px; padding: .05rem .6rem; font-size: .85em; }
  .delta-up { color: #e0a3a3; } .delta-down { color: #a3e0a3; }
  @keyframes pbglow { from { box-shadow: 0 0 3px #ffd75f; } to { box-shadow: 0 0 10px #ffd75f; } }
  .pb-glow { border-color: #ffd75f; color: #ffd75f;
             animation: pbglow 0.9s ease-in-out infinite alternate; }
  /* progress-graph pick: one fading gold pulse lands the eye on the row */
  @keyframes rowflash { from { background: #3a321d; } to { background: transparent; } }
  .row-flash td { animation: rowflash 1.6s ease-out; }
  /* new-entry blink: three gold pulses single out the row that just landed */
  @keyframes rownew { 0%, 100% { background: transparent; } 50% { background: #3a321d; } }
  .row-new td { animation: rownew 0.8s ease-in-out 3; }
  .popover { position: absolute; background: #1b1e24; border: 1px solid #3a4150;
             border-radius: 6px; padding: .7rem; z-index: 5; }
  li { margin: .25rem 0; list-style: none; } ul { padding: 0; }
  .star { color: #ffd75f; }
  .src { font-size: .75em; padding: 0 .3em; border-radius: 3px; margin-left: .3em; }
  .src-result { background: #1d3a1d; color: #a3e0a3; }
  .src-counter { background: #2d2d3a; color: #a3b0e0; }
  .src-reconstructed { background: #3a321d; color: #e0cba3; }
  .replay-row td { background: #0d0d12; padding: .5rem .75rem; }
  .replay-path { text-decoration: underline dotted; cursor: pointer; }
  .replay-player video { width: 100%; max-width: 720px; display: block;
                         margin: .25rem 0; border: 1px solid #333; }
  .runbar { display: flex; flex-wrap: wrap; gap: .6rem; align-items: center; margin: .6rem 0; }
  .runclock { font-size: 2.2rem; font-weight: bold; letter-spacing: 1px; }
  .runsplits { width: 100%; border-collapse: collapse; font-size: .95em; }
  .runsplits td { padding: .25rem .5rem; border-bottom: 1px dotted #2c3140; }
  .runstep-cur { background: rgba(68,153,136,.14); }
  .runstep-cur td { border-color: #4ca; }
  .rundone { opacity: .85; } .runupcoming { opacity: .4; }
  .rungold { color: #ffd75f; }
  .runahead { color: #a3e0a3; } .runbehind { color: #e0a3a3; }
  .runhide { cursor: pointer; }
  /* Focus mode: strip all performance coloring to a calm monochrome */
  .runfocus .rungold, .runfocus .runahead, .runfocus .runbehind,
  .runfocus .runclock { color: #d8dee9; }
  .runfocus .runstep-cur { background: rgba(200,200,200,.10); }
  .runfocus .runstep-cur td { border-color: #888; }
  .runhistory { margin-top: 1rem; border-top: 1px solid #2c3140; padding-top: .6rem; }
  .rungraph { width: 100%; height: 150px; display: block; margin: .4rem 0; }
  .rungraph-empty { color: #6c7686; font-size: .85em; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center; z-index: 50; }
  .modal { background: #1b1e24; border: 1px solid #3a4150; border-radius: 10px;
    padding: 1rem 1.2rem; max-width: 540px; width: 90%; max-height: 80vh;
    overflow: auto; }
  .modal h2 { font-size: 1.05rem; margin: 0 0 .3rem; color: #ffd75f; }
  .update-notes { background: #14161a; border: 1px solid #2c3140;
    border-radius: 6px; padding: .5rem .7rem; margin: .6rem 0; font-size: .9em;
    line-height: 1.5; }
  .update-notes ul { padding-left: 1.1rem; margin: .4em 0; } .update-notes li { list-style: disc; }
  .update-notes p { margin: .5em 0; } .update-notes p:first-child { margin-top: 0; }
  .update-notes code { background: #2c3140; border-radius: 3px; padding: 0 .25em; }
  .modal-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .6rem; }
  .btnlink { display: inline-block; padding: .15rem .55rem; border: 1px solid #3a4150;
    border-radius: 4px; text-decoration: none; }
  .progress { background: #14161a; border: 1px solid #2c3140; border-radius: 4px;
    height: 10px; overflow: hidden; margin-top: .5rem; }
  .progress-bar { background: #6fa8ff; height: 100%; transition: width .3s; }
  .stdpanel{margin-top:8px}
  .disc{background:#161b22;border:1px solid #2a2f3a;border-radius:6px;padding:7px 11px;color:#cdd3da;font-size:13px}
  .stdbody{border:1px solid #2a2f3a;border-top:none;padding:8px;overflow-x:auto}
  .stdtable{border-collapse:collapse;font-size:11px}
  .stdtable th,.stdtable td{border:1px solid #21262d;padding:3px 7px;text-align:center}
  .stdtable .col-active{box-shadow:inset 0 0 0 2px #3a8d8d}
  .stdinp{width:48px;background:#0d1117;border:1px solid #30363d;color:#e6e9ee;border-radius:4px;text-align:center}
  .stdtools{display:flex;gap:8px;margin-bottom:6px}
  .weakflag{font-size:9px;color:#e0707a;border:1px solid #5a2e2e;border-radius:4px;padding:1px 5px;text-transform:uppercase;letter-spacing:.4px;margin:0 4px}
  .routeavg{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:13px}
</style></head>
